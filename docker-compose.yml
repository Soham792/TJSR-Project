services:
  postgres:
    image: postgres:16-alpine
    container_name: tjsr-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tjsr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tjsr_secret}
      POSTGRES_DB: ${POSTGRES_DB:-tjsr_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tjsr}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tjsr-network

  neo4j:
    image: neo4j:5-community
    container_name: tjsr-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-tjsr_secret}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-tjsr_secret}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - tjsr-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: tjsr-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tjsr-network

  redis:
    image: redis:7-alpine
    container_name: tjsr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tjsr-network

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  redis_data:

networks:
  tjsr-network:
    driver: bridge
